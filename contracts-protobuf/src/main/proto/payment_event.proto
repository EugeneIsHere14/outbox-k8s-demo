syntax = "proto3";

package payment.events;

import "payment_status.proto";

option java_package = "com.demo.protobuf.payment.event";
option java_multiple_files = true;


message PaymentEvent {
  string event_id = 1;
  string event_type = 2;
  int64 order_id = 3;
  string customer_name = 4;
  string amount = 5;
  PaymentStatus status = 6;
}
