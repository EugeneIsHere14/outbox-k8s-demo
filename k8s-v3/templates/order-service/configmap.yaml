{{- if .Values.orderService.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: {{ .Values.global.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .Values.orderService.syncWave }}"
data:
  PAYMENT_SERVICE_URL: "{{ .Values.orderService.paymentServiceUrl }}"
{{- end }}
