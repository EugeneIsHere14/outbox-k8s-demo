{{- if .Values.paymentService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: {{ .Values.global.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .Values.paymentService.syncWave }}"
spec:
  type: ClusterIP
  selector:
    app: payment-service
  ports:
    - name: http
      port: {{ .Values.paymentService.port }}
      targetPort: {{ .Values.paymentService.port }}
{{- end }}
