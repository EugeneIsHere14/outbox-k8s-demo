{{- if .Values.paymentService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: {{ .Values.global.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .Values.paymentService.syncWave }}"
  labels:
    app: payment-service
    type: backend
    env: k8s
spec:
  replicas: {{ .Values.paymentService.replicas }}
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        type: backend
        env: k8s
    spec:
      containers:
        - name: payment-service
          image: "{{ .Values.paymentService.image }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.paymentService.port }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.paymentService.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.paymentService.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: payments-db-config
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payments-db-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payments-db-secret
                  key: DB_PASSWORD
{{- end }}
