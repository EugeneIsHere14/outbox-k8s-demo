{{- if .Values.functionsPaymentEventsKafkaTopic.enabled }}
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: {{ .Values.functionsPaymentEventsKafkaTopic.name }}
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .Values.functionsPaymentEventsKafkaTopic.syncWave }}"
spec:
  partitions: {{ .Values.functionsPaymentEventsKafkaTopic.partitions }}
  replicas: {{ .Values.functionsPaymentEventsKafkaTopic.replicas }}
  config:
    min.insync.replicas: 1
    cleanup.policy: delete
{{- end }}
