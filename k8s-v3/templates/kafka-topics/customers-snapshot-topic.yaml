{{- if .Values.snapshotCustomersKafkaTopic.enabled }}
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: customers-snapshot-test
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .Values.snapshotCustomersKafkaTopic.syncWave }}"
spec:
  topicName: {{ .Values.snapshotCustomersKafkaTopic.name }}
  partitions: {{ .Values.snapshotCustomersKafkaTopic.partitions }}
  replicas: {{ .Values.snapshotCustomersKafkaTopic.replicas }}
  config:
    min.insync.replicas: 1
    cleanup.policy: delete
{{- end }}
