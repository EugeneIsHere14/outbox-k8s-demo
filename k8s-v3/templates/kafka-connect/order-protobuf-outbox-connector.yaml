{{- if .Values.orderProtobufOutboxConnector.enabled }}
apiVersion: kafka.strimzi.io/v1
kind: KafkaConnector
metadata:
  name: order-protobuf-outbox-connector
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-connect
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .Values.orderProtobufOutboxConnector.syncWave }}"
spec:
  class: io.debezium.connector.mysql.MySqlConnector
  tasksMax: 1
  config:
    database.hostname: "{{ .Values.orderProtobufOutboxConnector.ordersDatabaseHost }}"
    database.port: "{{ .Values.orderProtobufOutboxConnector.ordersDatabasePort }}"
    database.user: "{{ .Values.orderProtobufOutboxConnector.ordersDatabaseUser }}"
    database.password: "{{ .Values.orderProtobufOutboxConnector.ordersDatabasePassword }}"
    database.server.id: "{{ .Values.orderProtobufOutboxConnector.serverId }}"
    topic.prefix: "{{ .Values.orderProtobufOutboxConnector.topicPrefix }}"

    database.include.list: "orders"
    table.include.list: "orders.protobuf_outbox_events"

    schema.history.internal.kafka.bootstrap.servers: "kafka-kafka-bootstrap:9092"
    schema.history.internal.kafka.topic: "schemahistory.orders.protobuf"

    include.schema.changes: "false"
    snapshot.mode: "when_needed"
    tombstones.on.delete: "false"

    transforms: "outbox"
    transforms.outbox.type: "io.debezium.transforms.outbox.EventRouter"
    transforms.outbox.route.topic.replacement: ${routedByValue}
    transforms.outbox.table.field.event.id: "event_id"
    transforms.outbox.table.field.event.key: "aggregate_id"
    transforms.outbox.table.field.event.payload: "payload"
    transforms.outbox.route.by.field: "{{ .Values.orderProtobufOutboxConnector.routeByField }}"

    transforms.outbox.table.expand.json.payload: "false"
    key.converter: "{{ .Values.orderProtobufOutboxConnector.keyConverter }}"
    value.converter: "{{ .Values.orderProtobufOutboxConnector.valueConverter }}"
{{- end }}
