{{- if .Values.debeziumConnector.enabled }}
apiVersion: kafka.strimzi.io/v1
kind: KafkaConnector
metadata:
  name: order-outbox-connector
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-connect
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .Values.debeziumConnector.syncWave }}"
spec:
  class: io.debezium.connector.mysql.MySqlConnector
  tasksMax: 1
  config:
    database.hostname: "{{ .Values.debeziumConnector.ordersDatabaseHost }}"
    database.port: "{{ .Values.debeziumConnector.ordersDatabasePort }}"
    database.user: "{{ .Values.debeziumConnector.ordersDatabaseUser }}"
    database.password: "{{ .Values.debeziumConnector.ordersDatabasePassword }}"
    database.server.id: "{{ .Values.debeziumConnector.serverId }}"
    topic.prefix: "{{ .Values.debeziumConnector.topicPrefix }}"
    database.include.list: "orders"
    table.include.list: "orders.outbox_events"
    schema.history.internal.kafka.bootstrap.servers: "kafka-kafka-bootstrap:9092"
    schema.history.internal.kafka.topic: "schemahistory.orders"
    include.schema.changes: "false"
    snapshot.mode: "initial"
    tombstones.on.delete: "false"
    transforms: "outbox"
    transforms.outbox.type: "io.debezium.transforms.outbox.EventRouter"
    transforms.outbox.route.topic.replacement: "{{ .Values.debeziumConnector.topicReplacement }}"
    transforms.outbox.table.field.event.id: "id"
    transforms.outbox.table.field.event.key: "aggregate_id"
    transforms.outbox.table.field.event.payload: "payload"
    transforms.outbox.route.by.field: "aggregate_type"
    transforms.outbox.table.expand.json.payload: "true"
    predicates: "isOutboxTable"
    predicates.isOutboxTable.type: "org.apache.kafka.connect.transforms.predicates.TopicNameMatches"
    predicates.isOutboxTable.pattern: "ordersdb\\.orders\\.outbox_events"
    transforms.outbox.predicate: "isOutboxTable"
{{- end }}
