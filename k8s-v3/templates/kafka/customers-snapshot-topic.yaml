{{- if .Values.customersSnapshotkafkaTopic.enabled }}
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: customersdb-orders-customers-snapshot-test
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .Values.customersSnapshotkafkaTopic.syncWave }}"
spec:
  topicName: {{ .Values.customersSnapshotkafkaTopic.name }}
  partitions: {{ .Values.customersSnapshotkafkaTopic.partitions }}
  replicas: {{ .Values.customersSnapshotkafkaTopic.replicas }}
  config:
    min.insync.replicas: 1
    cleanup.policy: delete
{{- end }}
