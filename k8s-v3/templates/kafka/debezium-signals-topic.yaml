{{- if .Values.snapshotSignalsKafkaTopic.enabled }}
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: customers-signals-topic
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .Values.snapshotSignalsKafkaTopic.syncWave }}"
spec:
  topicName: {{ .Values.snapshotSignalsKafkaTopic.name }}
  partitions: {{ .Values.snapshotSignalsKafkaTopic.partitions }}
  replicas: {{ .Values.snapshotSignalsKafkaTopic.replicas }}
  config:
    min.insync.replicas: 1
    cleanup.policy: delete
{{- end }}
