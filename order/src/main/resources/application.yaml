spring:
  application:
    name: order

  profiles:
    active: k8s

  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema-${spring.profiles.active}.sql
      data-locations: classpath:sql/data-${spring.profiles.active}.sql

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  ssl:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState, db
        liveness:
          include: livenessState
